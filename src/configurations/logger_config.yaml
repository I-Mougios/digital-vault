---
version: 1
disable_existing_loggers: false

formatters:
  dict_formatter:
    "()": shared_utils.logging.DictFormatter


handlers:
  mongo_handler:
    class: shared_utils.logging.MongoLogger
    formatter: dict_formatter

loggers:
  root:
    level: DEBUG

  mongo_logger:
    level: INFO
    handlers:
      - mongo_handler




